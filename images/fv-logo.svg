  <path d="M 172 118 C 185 112,215 110,240 114"
        fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 240 114 C 258 112,270 120,278 142 C 284 158,286 172,288 180 C 292 162,302 138,318 124 C 330 114,350 108,366 104 C 390 98,420 102,440 112"
        fill="none" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 440 112 C 460 120,468 128,464 138"
