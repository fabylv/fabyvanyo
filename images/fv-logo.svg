  <!-- Sparkles -->
  <g transform="translate(476,78)"><path d="M0,-14 L2,-2 L14,0 L2,2 L0,14 L-2,2 L-14,0 L-2,-2 Z" fill="#F5CA42"/></g>
  <g transform="translate(506,98)"><path d="M0,-8 L1.2,-1.2 L8,0 L1.2,1.2 L0,8 L-1.2,1.2 L-8,0 L-1.2,-1.2 Z" fill="#38C4F5"/></g>
  <g transform="translate(492,58)"><path d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z" fill="#E845B8" opacity="0.75"/></g>
  <g transform="translate(522,76)"><path d="M0,-4 L0.6,-0.6 L4,0 L0.6,0.6 L0,4 L-0.6,0.6 L-4,0 L-0.6,-0.6 Z" fill="#B06EF0" opacity="0.6"/></g>

  <!-- Ghost wordmark — adapts to bg via currentColor -->
  <text x="340" y="228" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="62" font-weight="200" letter-spacing="18"
