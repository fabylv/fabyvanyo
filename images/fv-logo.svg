<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B06EF0"/>
      <stop offset="35%" stop-color="#E845B8"/>
      <stop offset="70%" stop-color="#F07880"/>
      <stop offset="100%" stop-color="#38C4F5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B06EF0"/>
      <stop offset="50%" stop-color="#E845B8"/>
      <stop offset="100%" stop-color="#F0A878"/>
