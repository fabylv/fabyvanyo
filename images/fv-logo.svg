  <!-- Divider lines + dot -->
  <line x1="148" y1="252" x2="300" y2="252" stroke="url(#g2)" stroke-width="1"/>
  <circle cx="340" cy="252" r="3.5" fill="#E845B8"/>
  <line x1="380" y1="252" x2="532" y2="252" stroke="url(#g2)" stroke-width="1"/>

  <!-- Tagline — all gradient colors, readable on both backgrounds -->
  <text x="145" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#B06EF0">ENGINEER</text>
  <text x="252" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9" fill="#C860A8">•</text>
  <text x="268" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#C860A8">FOUNDER</text>
  <text x="365" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9" fill="#E87868">•</text>
  <text x="381" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#E87868">AUTHOR</text>
  <text x="460" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9" fill="#38C4F5">•</text>
  <text x="476" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#38C4F5">CREATOR</text>

  <!-- URL — adapts to bg via currentColor -->
  <text x="340" y="318" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="9" font-weight="300" letter-spacing="3"
        class="url">FABYVANYO.COM</text>
